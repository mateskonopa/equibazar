<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiBazar - Inzerce s reálnou mapou</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Výška kontejneru s mapou */
        #map {
            height: 300px;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col">

    <header class="bg-stone-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🐴</span>
                <h1 class="text-2xl font-bold tracking-wide">Equi<span class="text-amber-500">Bazar</span></h1>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <div class="relative w-full sm:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i data-lucide="search" class="w-4 h-4 text-stone-400"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="Hledat mezi inzeráty..." class="w-full pl-10 pr-4 py-2 rounded-lg bg-stone-800 text-white placeholder-stone-400 border border-stone-700 focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <button onclick="alert('Pro ukládání inzerátů je potřeba napojit databázi.')" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold px-4 py-2 rounded-lg transition duration-200 flex items-center gap-1.5 shrink-0 shadow-sm">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Přidat
                </button>
            </div>
        </div>
    </header>

    <section class="bg-white border-b border-stone-200 py-4 shadow-sm sticky top-[72px] sm:top-[76px] z-40">
        <div class="container mx-auto px-4">
            <div class="flex items-center gap-3 overflow-x-auto pb-2 sm:pb-0 no-scrollbar scroll-smooth">
                <button onclick="selectCategory('all')" id="cat-all" class="category-btn active flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-semibold transition-all duration-200 whitespace-nowrap bg-amber-800 border-amber-800 text-white shadow-sm">
                    <span class="text-base">📋</span> Všechno
                </button>
                <button onclick="selectCategory('prodej')" id="cat-prodej" class="category-btn flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 whitespace-nowrap bg-stone-50 border-stone-200 text-stone-700 hover:bg-stone-100">
                    <span class="text-base">🐴</span> Koně na prodej
                </button>
                <button onclick="selectCategory('ustajeni')" id="cat-ustajeni" class="category-btn flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 whitespace-nowrap bg-stone-50 border-stone-200 text-stone-700 hover:bg-stone-100">
                    <span class="text-base">🏡</span> Nabídky ustájení
                </button>
                <button onclick="selectCategory('seno')" id="cat-seno" class="category-btn flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 whitespace-nowrap bg-stone-50 border-stone-200 text-stone-700 hover:bg-stone-100">
                    <span class="text-base">🌾</span> Seno, krmiva a podestýlky
                </button>
                <button onclick="selectCategory('vybaveni')" id="cat-vybaveni" class="category-btn flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 whitespace-nowrap bg-stone-50 border-stone-200 text-stone-700 hover:bg-stone-100">
                    <span class="text-base">📦</span> Vybavení
                </button>
<button onclick="selectCategory('veterinari')" id="cat-veterinari" class="category-btn flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium transition-all duration-200 whitespace-nowrap bg-stone-50 border-stone-200 text-stone-700 hover:bg-stone-100">
    <span class="text-base">⚕️</span> Veterináři
</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <aside class="space-y-6">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200/60 overflow-hidden">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-stone-500 mb-3 flex items-center gap-1.5">
                        <i data-lucide="map" class="w-4 h-4"></i> Mapa inzerátů
                    </h3>
                    <div id="map" class="rounded-lg border border-stone-200"></div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200/60 space-y-5">

                        <div class="flex items-center gap-1.5 text-amber-800 font-bold text-sm border-b border-stone-100 pb-2">

                        </div>
                        <div class="space-y-2.5 text-sm">
                            <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition" title="Luční a vojtěškové seno, senáž v balících.">
                                <input type="checkbox" value="seno_senaz" class="feed-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                <span>🌾 Seno a senáž</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition" title="Sláma, hobliny, pelety, lněné či konopné pazdeří.">
                                <input type="checkbox" value="slama_podestylka" class="feed-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                <span>🚜 Sláma a podestýlky</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition" title="Granule, müsli, mash, bezobilná krmiva.">
                                <input type="checkbox" value="smesi_granule" class="feed-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                <span>🐴 Granule, müsli a mash</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition" title="Oves, ječmen, řepné řízky, oleje, vitaminy, lizy.">
                                <input type="checkbox" value="jednodruhova_doplnky" class="feed-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                <span>🍎 Obiloviny, doplňky a lizy</span>
                            </label>
                        </div>
                    </div>

                    <div id="equipmentFiltersSection" class="hidden border-b border-stone-100 pb-5 space-y-5">

                                        <span>Stájové deky</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="deky_odpocovaci" data-parent="parent_deky" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Odpocovací a transportní deky</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="deky_bederni" data-parent="parent_deky" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Bederní deky</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="deky_ekzemove" data-parent="parent_deky" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Ekzémové a síťované deky</span>
                                    </label>
                                </div>
                            </div>

                            <!-- OCHRANA NOHOU -->
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition font-semibold">
                                    <input type="checkbox" id="parent_ochrana_nohou" class="equip-parent-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                    <span>🛡️ Ochrana nohou koně</span>
                                </label>
                                <div class="pl-6 ml-2 border-l border-stone-200 space-y-2 text-xs text-stone-600">
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="ochrana_gamase" data-parent="parent_ochrana_nohou" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Kamaše</span>

                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="ochrana_zvony" data-parent="parent_ochrana_nohou" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Zvony</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="ochrana_transportni" data-parent="parent_ochrana_nohou" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">

                                    </label>

                                    <input type="checkbox" id="parent_ostatni" class="equip-parent-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                    <span>➕ Ostatní vybavení na koně</span>
                                </label>
                                <div class="pl-6 ml-2 border-l border-stone-200 space-y-2 text-xs text-stone-600">
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-amber-800 transition">
                                        <input type="checkbox" value="ostatni_ohlavky" data-parent="parent_ostatni" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">

                                        <input type="checkbox" value="ostatni_pomocne_oteze" data-parent="parent_ostatni" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">

                                        <input type="checkbox" value="ostatni_cabraky" data-parent="parent_ostatni" class="equip-sub-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                                        <span>Čabraky na uši a masky</span>
                                    </label>
                                </div>
                            </div>
<div id="vetFiltersSection" class="hidden border-b border-stone-100 pb-5 space-y-5">

        <span>⚕️</span> Specializace

            <input type="checkbox" value="zubar" class="vet-filter-checkbox rounded text-amber-600">
            <span>Veterinární stomatologie</span>
        </label>
    </div>
</div>

                        </div>
                    </div>
                        
                   <div id="horseFiltersSection" class="hidden border-b border-stone-100 pb-5 space-y-5">

                            <span>🐴</span> Filtrování koní

            { id: 12, title: "Kvalitní vodítko s panik karabinou", category: "vybaveni", subcategory: "ostatni_ohlavky", price: 350, location: "Hlavní město Praha", district: "Praha", lat: 50.075, lng: 14.435, date: "Včera", image: "https://images.unsplash.com/photo-1598971861713-54ad16a7e72e?w=500&auto=format&fit=crop&q=60", desc: "Pevné nylonové vodítko o délce 2 m s bezpečnou panik karabinou." },
            { id: 13, title: "Měkká ohlávka COB s beránkem", category: "vybaveni", subcategory: "ostatni_ohlavky", price: 450, location: "Jihočeský", district: "Písek", lat: 49.308, lng: 14.147, date: "Před 2 dny", image: "https://images.unsplash.com/photo-1601574901173-dd3571d41b12?w=500&auto=format&fit=crop&q=60", desc: "Krásná ohlávka s fleece polstrováním na nánosníku a nátylníku." }
        ];

      const categoryNames = {
            all: "Všechny nabídky",
            prodej: "Koně na prodej",
            ustajeni: "Nabídky ustájení",
            seno: "Seno, krmiva a podestýlky",
            vybaveni: "Vybavení",
            veterinari: "Veterináři"
        };

        // Stav aplikace
        let activeCategory = "all";
        let activeLocation = "all";
        let selectedDistricts = [];
        let map;
        let mapMarkersGroup;

        // Filtry koní
        let selectedHorseGenders = [];
        let selectedHorseBreeds = [];
        let selectedHorsePriceRanges = [];
        let selectedHorseAgeRanges = [];

        // Filtry ustájení
        let selectedBoardingTypes = [];

        // Filtry krmiv a podestýlek
        let selectedFeedSubcategories = [];

        // Filtry vybavení
        let selectedEquipmentSubcategories = [];

        // DOM Elementy
        const listingsGrid = document.getElementById("listingsGrid");
        const noResults = document.getElementById("noResults");
        const resultsCount = document.getElementById("resultsCount");
        const currentCategoryTitle = document.getElementById("currentCategoryTitle");
        
        const searchInput = document.getElementById("searchInput");
        const filterLocation = document.getElementById("filterLocation");
        const filterPrice = document.getElementById("filterPrice");
        const districtSection = document.getElementById("districtSection");
        const districtContainer = document.getElementById("districtContainer");
        const horseFiltersSection = document.getElementById("horseFiltersSection");
        const boardingFiltersSection = document.getElementById("boardingFiltersSection");
        const feedFiltersSection = document.getElementById("feedFiltersSection");
        const equipmentFiltersSection = document.getElementById("equipmentFiltersSection");

        // --- INICIALIZACE REÁLNÉ MAPY ---
        function initMap() {
            map = L.map('map').setView([49.80, 15.50], 7);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18,
                attribution: '&copy; <br><a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            mapMarkersGroup = L.layerGroup().addTo(map);
        }

        // Aktualizace špendlíků na mapě podle aktuálně profiltrovaných dat
        function updateMapMarkers(filteredData) {
            mapMarkersGroup.clearLayers();

            filteredData.forEach(item => {
                const marker = L.marker([item.lat, item.lng]);
                
                marker.bindPopup(`
                    <div style="font-family: sans-serif; width: 160px;">
                        <img src="${item.image}" style="width:100%; height:80px; object-fit:cover; border-radius:4px; margin-bottom:5px;">
                        <b style="font-size:12px; display:block; margin-bottom:2px;">${item.title}</b>
                        <span style="color:#92400e; font-weight:bold; font-size:13px;">${item.price.toLocaleString('cs-CZ')} Kč</span>
                    </div>
                `);
                mapMarkersGroup.addLayer(marker);
            });
        }

        // --- FILTRAČNÍ LOGIKA ---
        filterLocation.addEventListener("change", (e) => {
            const krajValue = e.target.value;
            activeLocation = krajValue;
            selectedDistricts = [];
            
            if (krajValue !== "all" && czechRegionsData[krajValue]) {
                const region = czechRegionsData[krajValue];
                map.setView(region.coords, region.zoom);
            } else {
                map.setView([49.80, 15.50], 7);
            }

            generateDistricts(krajValue);
            filterListings();
        });

        function generateDistricts(kraj) {
            districtContainer.innerHTML = "";
            if (kraj === "all" || !czechRegionsData[kraj]) {
                districtSection.classList.add("hidden");
                return;
            }

            districtSection.classList.remove("hidden");
            czechRegionsData[kraj].districts.forEach(okres => {
                const label = document.createElement("label");
                label.className = "flex items-center gap-2 cursor-pointer hover:text-amber-800 transition";
                label.innerHTML = `
                    <input type="checkbox" value="${okres}" class="district-checkbox rounded text-amber-600 focus:ring-amber-500 border-stone-300">
                    <span>${okres}</span>
                `;
                
                label.querySelector('input').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedDistricts.push(e.target.value);
                    } else {
                        selectedDistricts = selectedDistricts.filter(item => item !== e.target.value);
                    }
                    filterListings();
                });

                districtContainer.appendChild(label);
            });
        }

        function selectCategory(categoryId) {
            activeCategory = categoryId;
            currentCategoryTitle.innerText = categoryNames[categoryId];

            document.querySelectorAll(".category-btn").forEach(btn => {
                btn.classList.remove("active", "bg-amber-800", "border-amber-800", "text-white", "shadow-sm");
                btn.classList.add("bg-stone-50", "border-stone-200", "text-stone-700", "hover:bg-stone-100");
            });

            const activeBtn = document.getElementById(`cat-${categoryId}`);
            activeBtn.classList.add("active", "bg-amber-800", "border-amber-800", "text-white", "shadow-sm");
            activeBtn.classList.remove("bg-stone-50", "border-stone-200", "text-stone-700", "hover:bg-stone-100");

            // Zobrazení/skrytí specifických koňských filtrů
            if (categoryId === "prodej") {
                if (horseFiltersSection) horseFiltersSection.classList.remove("hidden");
            } else {
                if (horseFiltersSection) horseFiltersSection.classList.add("hidden");
                resetHorseFilters();
            }

            // Zobrazení/skrytí specifických filtrů pro ustájení
            if (categoryId === "ustajeni") {
                boardingFiltersSection.classList.remove("hidden");
            } else {
                boardingFiltersSection.classList.add("hidden");
                resetBoardingFilters();
            }

            // Zobrazení/skrytí specifických filtrů pro krmiva
            if (categoryId === "seno") {
                feedFiltersSection.classList.remove("hidden");
            } else {
                feedFiltersSection.classList.add("hidden");
                resetFeedFilters();
            }

            // Zobrazení/skrytí specifických filtrů pro vybavení
            if (categoryId === "vybaveni") {
                equipmentFiltersSection.classList.remove("hidden");
            } else {
                equipmentFiltersSection.classList.add("hidden");
                resetEquipmentFilters();
            }

            filterListings();
        }

        // Event listenery pro filtry koní
        function setupHorseFilterListeners() {
            document.querySelectorAll(".horse-gender-checkbox").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    if (e.target.checked) selectedHorseGenders.push(e.target.value);

            });
        }

        // Event listenery pro filtry krmiv
        function setupFeedFilterListeners() {
            document.querySelectorAll(".feed-sub-checkbox").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    if (e.target.checked) selectedFeedSubcategories.push(e.target.value);
                    else selectedFeedSubcategories = selectedFeedSubcategories.filter(v => v !== e.target.value);
                    filterListings();
                });
            });
        }

        // Event listenery pro filtry vybavení (s Parent-Child logikou)
        function setupEquipmentFilterListeners() {
            // Parent-child zaškrtávání
            document.querySelectorAll(".equip-parent-checkbox").forEach(parentCb => {
                parentCb.addEventListener("change", (e) => {
                    const parentId = e.target.id;
                    const childCheckboxes = document.querySelectorAll(`.equip-sub-checkbox[data-parent="${parentId}"]`);
                    
                    childCheckboxes.forEach(child => {
                        child.checked = e.target.checked;
                        // Ruční vyvolání change eventu, aby se zaktualizovalo pole filtrů
                        child.dispatchEvent(new Event('change'));
                    });
                });
            });

            document.querySelectorAll(".equip-sub-checkbox").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    if (e.target.checked) {
                        if (!selectedEquipmentSubcategories.includes(e.target.value)) {
                            selectedEquipmentSubcategories.push(e.target.value);
                        }
                    } else {
                        selectedEquipmentSubcategories = selectedEquipmentSubcategories.filter(v => v !== e.target.value);
                        
                        // Odškrtnutí rodičovského checkboxu, pokud je některý potomek odškrtnutý
                        const parentId = e.target.getAttribute("data-parent");
                        const parentCb = document.getElementById(parentId);
                        if (parentCb) parentCb.checked = false;
                    }
                    filterListings();
                });
            });
        }

        function resetHorseFilters() {
            selectedHorseGenders = [];
            selectedHorseBreeds = [];
            selectedHorsePriceRanges = [];
            selectedHorseAgeRanges = [];
            document.querySelectorAll(".horse-gender-checkbox, .horse-breed-checkbox, .horse-price-checkbox, .horse-age-checkbox").forEach(cb => {
                cb.checked = false;
            });
        }

        function resetBoardingFilters() {
            selectedBoardingTypes = [];
            document.querySelectorAll(".boarding-type-checkbox").forEach(cb => {
                cb.checked = false;
            });
        }

        function resetFeedFilters() {
            selectedFeedSubcategories = [];
            document.querySelectorAll(".feed-sub-checkbox").forEach(cb => {
                cb.checked = false;
            });
        }

        function resetEquipmentFilters() {
            selectedEquipmentSubcategories = [];
            document.querySelectorAll(".equip-sub-checkbox, .equip-parent-checkbox").forEach(cb => {
                cb.checked = false;
            });
        }

        function matchesHorseFilters(item) {
            if (activeCategory !== "prodej") return true;

            // Pohlaví
            if (selectedHorseGenders.length > 0 && (!item.gender || !selectedHorseGenders.includes(item.gender))) {
                return false;
            }

            // Plemena
            if (selectedHorseBreeds.length > 0 && (!item.breed || !selectedHorseBreeds.includes(item.breed))) {
                return false;
            }

            // Cenové hladiny
            if (selectedHorsePriceRanges.length > 0) {
                let priceMatch = false;
                const price = item.price;
                selectedHorsePriceRanges.forEach(range => {
                    if (range === "under50" && price < 50000) priceMatch = true;
                    if (range === "50to150" && price >= 50000 && price <= 150000) priceMatch = true;
                    if (range === "over150" && price > 150000) priceMatch = true;
                });
                if (!priceMatch) return false;
            }

            // Věkové hladiny
            if (selectedHorseAgeRanges.length > 0) {
                let ageMatch = false;
                const age = item.age;
                if (age !== undefined) {
                    selectedHorseAgeRanges.forEach(range => {
                        if (range === "foal" && age <= 1) ageMatch = true;
                        if (range === "young" && age > 1 && age <= 4) ageMatch = true;
                        if (range === "adult" && age > 4 && age <= 15) ageMatch = true;
                        if (range === "senior" && age > 15) ageMatch = true;
                    });
                }
                if (!ageMatch) return false;
            }

            return true;
        }

        function matchesBoardingFilters(item) {
            if (activeCategory !== "ustajeni") return true;

            if (selectedBoardingTypes.length > 0 && (!item.boardingType || !selectedBoardingTypes.includes(item.boardingType))) {
                return false;
            }

            return true;
        }

        function matchesFeedFilters(item) {
            if (activeCategory !== "seno") return true;

            if (selectedFeedSubcategories.length > 0 && (!item.subcategory || !selectedFeedSubcategories.includes(item.subcategory))) {
                return false;
            }

            return true;
        }

        function matchesEquipmentFilters(item) {
            if (activeCategory !== "vybaveni") return true;

            if (selectedEquipmentSubcategories.length > 0 && (!item.subcategory || !selectedEquipmentSubcategories.includes(item.subcategory))) {
                return false;
            }

            return true;
        }

        function filterListings() {
            const searchVal = searchInput.value.toLowerCase();
            const maxPriceVal = parseFloat(filterPrice.value);

            const filtered = listings.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchVal) || item.desc.toLowerCase().includes(searchVal);
                const matchesCategory = activeCategory === "all" || item.category === activeCategory;
                const matchesLocation = activeLocation === "all" || item.location === activeLocation;
                const matchesDistrict = selectedDistricts.length === 0 || selectedDistricts.includes(item.district);
                const matchesPrice = isNaN(maxPriceVal) || item.price <= maxPriceVal;

                // Aplikace specifických filtrů
                const matchesHorse = matchesHorseFilters(item);
                const matchesBoarding = matchesBoardingFilters(item);
                const matchesFeed = matchesFeedFilters(item);
                const matchesEquipment = matchesEquipmentFilters(item);

                return matchesSearch && matchesCategory && matchesLocation && matchesDistrict && matchesPrice && matchesHorse && matchesBoarding && matchesFeed && matchesEquipment;
            });

            renderListings(filtered);
            updateMapMarkers(filtered);
        }

        function renderListings(data) {
            listingsGrid.innerHTML = "";
            if (data.length === 0) {
                listingsGrid.classList.add("hidden");
                noResults.classList.remove("hidden");
                resultsCount.innerText = "0 inzerátů";
                return;
            }

            listingsGrid.classList.remove("hidden");
            noResults.classList.add("hidden");
            resultsCount.innerText = `${data.length} ${getNoun(data.length, 'inzerát', 'inzeráty', 'inzerátů')}`;

            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-xl shadow-sm border border-stone-200/60 overflow-hidden hover:shadow-md transition duration-200 flex flex-col";
                
                let extraDetailsHTML = "";
                if (item.category === "prodej" && item.gender) {
                    extraDetailsHTML = `
                        <div class="mt-2 flex flex-wrap gap-1.5 text-xs text-stone-500 font-medium">
                            <span class="bg-amber-50 text-amber-800 px-2 py-0.5 rounded border border-amber-100">${item.breed || 'Neznámé plemeno'}</span>
                            <span class="bg-stone-100 text-stone-700 px-2 py-0.5 rounded">${item.gender}</span>
                            <span class="bg-stone-100 text-stone-700 px-2 py-0.5 rounded">${item.age} let</span>
                        </div>
                    `;
                } else if (item.category === "ustajeni" && item.boardingType) {
                    const boardingLabels = {
                        boxove: "Boxové ustájení",
                        pastevni: "Pastevní ustájení",
                        kombinovane: "Kombinované"
                    };
                    extraDetailsHTML = `
                        <div class="mt-2 flex flex-wrap gap-1.5 text-xs text-stone-500 font-medium">
                            <span class="bg-amber-50 text-amber-800 px-2 py-0.5 rounded border border-amber-100">
                                🏡 ${boardingLabels[item.boardingType] || item.boardingType}
                            </span>
                        </div>
                    `;
                } else if (item.category === "seno" && item.subcategory) {
                    const subLabels = {
                        seno_senaz: "Seno a senáž",
                        slama_podestylka: "Sláma a podestýlky",
                        smesi_granule: "Granule, müsli a mash",
                        jednodruhova_doplnky: "Obiloviny a doplňky"
                    };
                    extraDetailsHTML = `
                        <div class="mt-2 flex flex-wrap gap-1.5 text-xs text-stone-500 font-medium">
                            <span class="bg-amber-50 text-amber-800 px-2 py-0.5 rounded border border-amber-100">
                                🌾 ${subLabels[item.subcategory] || item.subcategory}
                            </span>
                        </div>
                    `;
                } else if (item.category === "vybaveni" && item.subcategory) {
                    const equipLabels = {
                        sedla_podsedlove_decky: "Dečky a beránky",
                        sedla_podbrisniky: "Podbřišníky",
                        sedla_trmeny: "Třmeny a řemeny",
                        sedla_prislusenstvi: "Příslušenství k sedlům",
                        uzdeni_uzdecky: "Uzdečky a uzdy",
                        uzdeni_udidla: "Udidla",
                        uzdeni_bezudilove: "Bezudilové uždění",
                        uzdeni_oteze: "Otěže",
                        uzdeni_celenky: "Čelenky a nánosníky",
                        deky_vybehove: "Výběhové deky",
                        deky_stajove: "Stájové deky",
                        deky_odpocovaci: "Odpocovací deky",
                        deky_bederni: "Bederní deky",
                        deky_ekzemove: "Deky proti hmyzu",
                        ochrana_gamase: "Gamaše a chrániče",
                        ochrana_bandaze: "Bandáže a podložky",
                        ochrana_zvony: "Zvony",
                        ochrana_transportni: "Transportní chrániče",
                        ostatni_ohlavky: "Ohlávky a vodítka",
                        ostatni_pomocne_oteze: "Pomocné otěže a lonž",
                        ostatni_cabraky: "Čabraky a masky"
                    };
                    extraDetailsHTML = `
                        <div class="mt-2 flex flex-wrap gap-1.5 text-xs text-stone-500 font-medium">
                            <span class="bg-amber-50 text-amber-800 px-2 py-0.5 rounded border border-amber-100">
                                📦 ${equipLabels[item.subcategory] || item.subcategory}
                            </span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="relative h-48 bg-stone-100">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover">
                        <span class="absolute top-3 left-3 bg-stone-900/80 backdrop-blur-sm text-white text-xs font-semibold px-2.5 py-1 rounded-md">
                            ${item.category === 'prodej' ? '🐴 Koně na prodej' : item.category === 'ustajeni' ? '🏡 Ustájení' : item.category === 'seno' ? '🌾 Krmiva' : '📦 Vybavení'}
                        </span>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-base text-stone-900 mb-2 line-clamp-1">${item.title}</h3>
                            <p class="text-xs text-stone-600 line-clamp-2 mb-2">${item.desc}</p>
                            ${extraDetailsHTML}
                        </div>
                        <div class="mt-4">
                            <div class="text-lg font-black text-amber-800 mb-3">
                                ${item.price.toLocaleString('cs-CZ')} Kč
                            </div>
                            <div class="border-t border-stone-100 pt-3 flex justify-between items-center text-[11px] text-stone-500 font-medium">
                                <span class="flex items-center gap-1">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-stone-400"></i> ${item.district} (${item.location})
                                </span>
                                <span>${item.date}</span>
                            </div>
                        </div>
                    </div>
                `;
                listingsGrid.appendChild(card);
            });
            lucide.createIcons();
        }

        function getNoun(number, one, two, many) {
            if (number === 1) return one;
            if (number >= 2 && number <= 4) return two;
            return many;
        }

        function resetAllFilters() {
            searchInput.value = "";
            filterPrice.value = "";
            filterLocation.value = "all";
            activeLocation = "all";
            selectedDistricts = [];
            districtSection.classList.add("hidden");
            map.setView([49.80, 15.50], 7);
            resetHorseFilters();
            resetBoardingFilters();
            resetFeedFilters();
            resetEquipmentFilters();
            selectCategory("all");
        }

        // Eventy
        searchInput.addEventListener("input", filterListings);
        filterPrice.addEventListener("input", filterListings);
        document.getElementById("resetFilters").addEventListener("click", resetAllFilters);

        // Start
        window.onload = () => {
            initMap();
            setupHorseFilterListeners();
            setupBoardingFilterListeners();
            setupFeedFilterListeners();
            setupEquipmentFilterListeners();
            renderListings(listings);
            updateMapMarkers(listings);
            lucide.createIcons();
        };
</script>
    <form id="inzeratForm">
        <input type="text" id="nadpis" placeholder="Nadpis" required>
        <input type="text" id="popis" placeholder="Popis" required>
        <input type="number" id="cena" placeholder="Cena" required>
        <button type="submit">Přidat inzerát</button>
    </form>

    <script>
        async function ulozInzerat(event) {
            event.preventDefault();
            const data = {
                nadpis: document.getElementById('nadpis').value,
                popis: document.getElementById('popis').value,
                cena: document.getElementById('cena').value
            };
            const apiURL = 'https://sheetdb.io/api/v1/3ku3s18jpeql4';
            const response = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [data] })
            });
            if (response.ok) {
                alert("Inzerát úspěšně přidán!");
                document.getElementById('inzeratForm').reset();
            } else {
                alert("Chyba při zápisu.");
            }
        }
        document.getElementById('inzeratForm').addEventListener('submit', ulozInzerat);
    </script>
</form>
</body>
</html>
